---
# Coarse-layer variables. Edits here are part of the machine's identity.

# The user this machine is being bootstrapped for.
# Hardcoded username — become:true makes ansible_facts.user_id return root.
target_user: "yuez"

# User groups target_user should be added to.
user_groups:
  - wheel
  - docker
  - input
  - video
  - render
  - network
  - audio
  - tty

# Services to enable in addition to core_services. Empty by default.
optional_services: []

# Services relevant only in VM guests (Proxmox, QEMU/KVM, etc.).
# Leave empty for bare-metal installs. When non-empty, the corresponding
# cloud-init and qemu-guest-agent systemd services are enabled and started.
# The packages (cloud-init, qemu-guest-agent) are always installed via
# pacman_packages.yml regardless of this setting.
vm_services:
  - cloud-init-local.service
  - cloud-init-main.service
  - cloud-init-network.service
  - cloud-config.service
  - cloud-final.service
  - qemu-guest-agent.service
# Common examples for a Proxmox/QEMU guest:
#   - cloud-init-local.service
#   - cloud-init-main.service
#   - cloud-init-network.service
#   - cloud-config.service
#   - cloud-final.service
#   - qemu-guest-agent.service

# URL of the dotfiles repo (consumed by bootstrap.sh, not by Ansible).
dotfiles_repo: "https://github.com/zgs225/dotfiles.git"

# Branch of the dotfiles repo to clone on first init.
# Leave empty to use the remote's default branch.
dotfiles_branch: "master"

# Set to true when the dotfiles repo contains age-encrypted files.
# bootstrap.sh will refuse to run unless an age identity is present at
# ~/.config/chezmoi/key.txt (or $AGE_KEY_FILE).
dotfiles_use_encryption: true

# tty1 autologin → startx → i3 chain on :0.
# Must be true for xrdp VNC backend — x0vncserver shares :0 over VNC.
display_autologin_enabled: true

# xrdp remote desktop (VNC backend, shares :0 display).
# Set to true to enable xrdp (RDP) + x0vncserver (VNC sharing :0).
# xrdp-sesman is disabled; no separate X sessions.
# Package tigervnc provides x0vncserver; xrdp provides RDP listener.
xrdp_enabled: true
