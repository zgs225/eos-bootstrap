---
- name: Deploy udev rules for DRI device symlinks
  ansible.builtin.shell: |
    set -euo pipefail
    RULE_FILE="/etc/udev/rules.d/60-dri-symlinks.rules"
    TMP=$(mktemp)

    for addr in $(lspci -D -d ::03xx 2>/dev/null | awk '{print $1}'); do
      vendor=$(lspci -s "$addr" 2>/dev/null | grep -ioP 'intel|amd|nvidia|virtio' | tr '[:upper:]' '[:lower:]' || true)
      [ -z "$vendor" ] && vendor="unknown"
      printf 'KERNEL=="card*", KERNELS=="%s", SUBSYSTEM=="drm", SUBSYSTEMS=="pci", SYMLINK+="dri/%s-gpu-card"\n' "$addr" "$vendor" >> "$TMP"
      printf 'KERNEL=="renderD*", KERNELS=="%s", SUBSYSTEM=="drm", SUBSYSTEMS=="pci", SYMLINK+="dri/%s-gpu-render"\n' "$addr" "$vendor" >> "$TMP"
    done

    if [ -s "$TMP" ]; then
      if diff -q "$TMP" "$RULE_FILE" >/dev/null 2>&1; then
        rm "$TMP"
        echo "skipped"
      else
        mv "$TMP" "$RULE_FILE"
        echo "updated"
      fi
    else
      rm "$TMP"
      if [ -f "$RULE_FILE" ]; then
        rm "$RULE_FILE"
        echo "updated"
      else
        echo "skipped"
      fi
    fi
  register: display_dri_udev
  changed_when: display_dri_udev.stdout == 'updated'
  check_mode: false
  notify: Reload udev
  tags: [display, dri-symlinks]
