---
# Defaults for the packages role. Loaded automatically into the role's
# variable scope and may be overridden by group_vars/all.yml or
# --extra-vars.
#
# The vars/ directory is intentionally NOT used for these lists: Ansible
# only auto-loads vars/main.yml from a role, not sibling files like
# vars/pacman_packages.yml. See the design spec for the rationale.

pacman_packages:
  # Base
  - sudo
  - vim
  - curl
  - wget
  - git-lfs
  - jq
  - unzip
  - zip
  - p7zip
  - poppler
  - ffmpeg
  - tree
  - htop
  - lsof
  - btop
  - tree
  # Networking
  - networkmanager
  - network-manager-applet
  - nm-connection-editor
  - tailscale
  # Xorg / X11 (startx + i3 — no display manager)
  - xorg-server
  - xorg-xinit
  - xorg-xinput
  - xclip
  - wmctrl
  - xdotool
  # GPU drivers and diagnostics (Intel / virtio / modesetting)
  - mesa
  - mesa-utils
  # VNC server for sharing :0 (xrdp VNC backend)
  - tigervnc
  # i3wm ecosystem
  - i3-wm
  - i3status
  - polybar
  - rofi
  - dunst
  - picom
  - feh
  - arandr
  - lxappearance
  # Theming
  - gtk3
  - gtk4
  - papirus-icon-theme
  - resvg
  - imagemagick
  - noto-fonts-cjk
  - noto-fonts-emoji
  - ttf-dejavu
  # Input method (Chinese pinyin via fcitx5)
  - fcitx5
  - fcitx5-chinese-addons
  - fcitx5-gtk
  - fcitx5-qt
  - fcitx5-configtool
  # Development
  - git
  - base-devel
  - ansible-lint
  - yamllint
  - python-yaml
  - linux-headers
  - openssh
  - rsync
  - ripgrep
  - fd
  - fzf
  - bat
  - eza
  - yazi
  - zoxide
  # Shell
  - zsh
  - zsh-completions
  - zsh-syntax-highlighting
  # Editors
  - neovim
  - tree-sitter-cli
  # Terminal
  - wezterm
  - tmux
  # Mise prerequisites
  - mise
  - maim
  - code
  - tesseract
  - tesseract-data-eng
  - tesseract-data-chi_sim
  # Dotfile encryption (chezmoi age backend)
  - age
  # Containers
  - docker
  - docker-compose
  # Desktop Apps
  - bitwarden
  # Cloud / VM guests (Proxmox, QEMU/KVM)
  # Only installed when running inside a VM (auto-detected via
  # ansible_virtualization_type). Service enablement is controlled by
  # `vm_services` in group_vars/all.yml.
vm_pacman_packages:
  - cloud-init
  - qemu-guest-agent
  - spice-vdagent

aur_packages:
  - nerd-fonts
  - google-chrome
  - opencode
  - clash-verge-rev-bin
  - betterlockscreen
  - xrdp
  - libinput-gestures
  - wps-office
  - ttf-wps-fonts
