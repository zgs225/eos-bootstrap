---
# Defaults for the packages role. Loaded automatically into the role's
# variable scope and may be overridden by group_vars/all.yml or
# --extra-vars.
#
# The vars/ directory is intentionally NOT used for these lists: Ansible
# only auto-loads vars/main.yml from a role, not sibling files like
# vars/pacman_packages.yml. See the design spec for the rationale.

pacman_packages:
  # Base
  - sudo
  - vim
  - curl
  - openbsd-netcat
  - nmap
  - httpie
  - wget
  - git-lfs
  - jq
  - go-yq
  - unzip
  - zip
  - p7zip
  - poppler
  - ffmpeg
  - tree
  - htop
  - lsof
  - btop
  - tree
  - pacman-contrib
  - inotify-tools
  # Networking
  - networkmanager
  - network-manager-applet
  - nm-connection-editor
  - tailscale
  # Xorg / X11 (startx + i3 — no display manager)
  - xorg-server
  - xorg-xinit
  - xorg-xinput
  - xorg-xwininfo
  - xclip
  - wmctrl
  - xdotool
  # GPU drivers and diagnostics (Intel / virtio / modesetting)
  - mesa
  - mesa-utils
  # VNC server for sharing :0 (xrdp VNC backend)
  - tigervnc
  # i3wm ecosystem
  - i3-wm
  - i3status
  - polybar
  - rofi
  - dunst
  - picom
  - feh
  - arandr
  - lxappearance
  - pamixer
  - brightnessctl
  # Keyboard remapping (kernel evdev/uinput daemon, sub-1ms latency)
  # python-xlib is required by keyd-application-mapper for X11 window-class detection.
  - keyd
  - python-xlib
  # Audio
  - pipewire
  - pipewire-alsa
  - pipewire-pulse
  - wireplumber
  - rtkit
  # Theming
  - gtk3
  - gtk4
  - papirus-icon-theme
  - resvg
  - imagemagick
  - noto-fonts-cjk
  - noto-fonts-emoji
  - ttf-dejavu
  - adobe-source-han-serif-cn-fonts
  - kvantum
  - kvantum-qt5
  # Input method (Chinese pinyin via fcitx5)
  - fcitx5
  - fcitx5-chinese-addons
  - fcitx5-gtk
  - fcitx5-qt
  - fcitx5-configtool
  # Development
  - git
  - base-devel
  - ansible-lint
  - yamllint
  - python-yaml
  - linux-headers
  - openssh
  - rsync
  - ripgrep
  - fd
  - fzf
  - bat
  - eza
  - yazi
  - zoxide
  # Shell
  - zsh
  - zsh-completions
  - zsh-syntax-highlighting
  # Editors
  - neovim
  - tree-sitter-cli
  # Terminal
  - wezterm
  - tmux
  # Mise prerequisites
  - mise
  - maim
  - code
  - tesseract
  - tesseract-data-eng
  - tesseract-data-chi_sim
  # Dotfile encryption (chezmoi age backend)
  - age
  # Containers
  - docker
  - docker-buildx
  - docker-compose
  # Desktop Apps
  - bitwarden
  - zathura
  - zathura-pdf-poppler
  - mpv
  - nsxiv
  - satty

# Thunar file manager and extensions (X11 + i3wm default)
thunar_packages:
  - thunar
  - thunar-volman
  - thunar-archive-plugin
  - gvfs
  - gvfs-smb
  - gvfs-nfs
  - gvfs-mtp
  - gvfs-afc
  - udisks2
  - tumbler
  - xarchiver

# Cloud / VM guests (Proxmox, QEMU/KVM)
# Only installed when running inside a VM (auto-detected via
# ansible_virtualization_type). Service enablement is controlled by
# `vm_services` in group_vars/all.yml.
vm_pacman_packages:
  - cloud-init
  - qemu-guest-agent
  - spice-vdagent

aur_packages:
  - nerd-fonts
  - google-chrome
  - opencode
  - kimi-code
  - cursor-bin
  - clash-verge-rev-bin
  - betterlockscreen
  - xrdp
  - libinput-gestures
  - wps-office
  - ttf-wps-fonts
  - ttf-lxgw-wenkai
  - eww
  - rofi-greenclip
  - wemeet-bin
  - buku

# Chong Xi Small Seal (崇羲篆體) — system-installed font
# Vendored archive lives at roles/packages/files/chongxi_seal.zip; the
# task file extracts it idempotently into chongxi_seal_install_dir and
# triggers the `Refresh font cache` handler. The URL and SHA-256 are
# recorded here so the vendored asset can be re-verified or replaced
# without code changes elsewhere.
chongxi_seal_zip_name: chongxi_seal.zip
chongxi_seal_otf_name: chongxi_seal.otf
chongxi_seal_install_dir: /usr/local/share/fonts/chongxi
chongxi_seal_source_url: >-
  https://xiaoxue.iis.sinica.edu.tw/chongxi/files/chongxi_seal.zip
chongxi_seal_source_sha256: >-
  f2094efc193956ca794fb57e991c0a7218287ac3c69bc14966b2c9871c65b7a7
