---
# Defaults for the packages role. Loaded automatically into the role's
# variable scope and may be overridden by group_vars/all.yml or
# --extra-vars.
#
# The vars/ directory is intentionally NOT used for these lists: Ansible
# only auto-loads vars/main.yml from a role, not sibling files like
# vars/pacman_packages.yml. See the design spec for the rationale.

pacman_packages:
  # Base
  - sudo
  - vim
  - curl
  - wget
  - jq
  - unzip
  - zip
  - tree
  - htop
  # Networking
  - networkmanager
  - nm-connection-editor
  # Xorg / X11 (startx + i3 — no display manager)
  - xorg-server
  - xorg-xinit
  - xclip
  # i3wm ecosystem
  - i3-wm
  - i3status
  - i3lock
  - polybar
  - rofi
  - dunst
  - picom
  - feh
  - arandr
  - lxappearance
  # Theming
  - gtk3
  - gtk4
  - papirus-icon-theme
  - noto-fonts-cjk
  - noto-fonts-emoji
  - ttf-dejavu
  # Input method (Chinese pinyin via fcitx5)
  - fcitx5
  - fcitx5-chinese-addons
  - fcitx5-gtk
  - fcitx5-qt
  - fcitx5-configtool
  # Development
  - git
  - base-devel
  - openssh
  - rsync
  - ripgrep
  - fd
  - fzf
  - bat
  - eza
  # Shell
  - zsh
  - zsh-completions
  - zsh-syntax-highlighting
  # Editors
  - neovim
  - tree-sitter-cli
  # Terminal
  - wezterm
  - tmux
  # Mise prerequisites
  - mise
  # Dotfile encryption (chezmoi age backend)
  - age
  # Containers
  - docker
  - docker-compose
  # Cloud / VM guests (Proxmox, QEMU/KVM)
  # Packages are always installed; service enablement is controlled by
  # `vm_services` in group_vars/all.yml.
  - cloud-init
  - qemu-guest-agent
  - spice-vdagent
  # Remote desktop (RDP via xrdp + Xvnc)
  - xrdp
  - tigervnc

aur_packages:
  # Fonts (nerd fonts for terminal icons: powerline, symbols, file icons)
  - nerd-fonts
  # Add more AUR packages here, e.g.:
  # - google-chrome
