---
- name: Check which AUR packages are already installed
  ansible.builtin.shell: |
    set -o pipefail
    pacman -Q {{ aur_packages | join(' ') }} >/dev/null 2>&1
  register: aur_all_installed
  changed_when: false
  failed_when: false
  check_mode: false
  when: aur_packages | length > 0

- name: Install AUR packages via paru
  become: true
  become_user: "{{ target_user }}"
  environment:
    PARU: "1"
  command:
    cmd: "paru -S --needed --noconfirm {{ aur_packages | join(' ') }}"
  when:
    - aur_packages | length > 0
    - aur_all_installed.rc | default(1) != 0
  changed_when: false
  check_mode: false
  register: aur_install
  failed_when: aur_install.rc != 0
