---
- name: Detect bluetooth hardware via kernel sysfs
  ansible.builtin.find:
    paths: /sys/class/bluetooth
    file_type: any
  register: bt_hw_check
  changed_when: false
  failed_when: false
  check_mode: false
  tags: [packages, bluetooth]

- name: Install bluez packages (bluetooth hardware detected)
  when: bt_hw_check.files | length > 0
  community.general.pacman:
    name:
      - bluez
      - blueman
      - bluez-utils
    state: present

- name: Deploy bluetooth main configuration
  when: bt_hw_check.files | length > 0
  ansible.builtin.template:
    src: bluetooth/main.conf.j2
    dest: /etc/bluetooth/main.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  notify: Restart bluetooth
  tags: [packages, bluetooth]

- name: Enable and start bluetooth.service (bluetooth hardware detected)
  when: bt_hw_check.files | length > 0
  ansible.builtin.systemd:
    name: bluetooth.service
    enabled: true
    state: started
