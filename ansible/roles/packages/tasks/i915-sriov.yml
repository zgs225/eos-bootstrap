---
- name: Detect Intel GPU via lspci
  ansible.builtin.shell: |
    set -o pipefail
    lspci -nn 2>/dev/null | grep -qiE '\[0300\].*8086:'
  register: i915_hw_check
  changed_when: false
  failed_when: i915_hw_check.rc not in [0, 1]
  check_mode: false

- name: Add i915 to empty MODULES in mkinitcpio.conf
  ansible.builtin.lineinfile:
    path: /etc/mkinitcpio.conf
    regexp: '^MODULES=\(\)$'
    line: 'MODULES=(i915)'
  when: i915_hw_check.rc == 0
  tags: [packages, i915-sriov]

- name: Append i915 to existing MODULES in mkinitcpio.conf
  ansible.builtin.lineinfile:
    path: /etc/mkinitcpio.conf
    regexp: '^MODULES=\((?!.*\bi915\b)(.*)\)$'
    backrefs: true
    line: 'MODULES=(\1 i915)'
  when: i915_hw_check.rc == 0
  tags: [packages, i915-sriov]

- name: Ensure kms hook is present in mkinitcpio.conf
  ansible.builtin.lineinfile:
    path: /etc/mkinitcpio.conf
    regexp: '^HOOKS=\((.*\bmodconf)(?!.*\bkms\b)(.*)\)$'
    backrefs: true
    line: 'HOOKS=(\1 kms\2)'
  when: i915_hw_check.rc == 0
  tags: [packages, i915-sriov]

- name: Install i915-sriov-dkms via AUR
  become: true
  become_user: "{{ target_user }}"
  environment:
    PARU: "1"
  command:
    cmd: "paru -S --needed --noconfirm i915-sriov-dkms"
  when: i915_hw_check.rc == 0
  changed_when: false
  check_mode: false
  notify: Regenerate initramfs
  tags: [packages, i915-sriov]

- name: Check kernel and headers version match
  ansible.builtin.shell: |
    set -o pipefail
    test "$(pacman -Q linux 2>/dev/null | awk '{print $2}')" = "$(pacman -Q linux-headers 2>/dev/null | awk '{print $2}')"
  register: kernel_headers_match
  changed_when: false
  failed_when: false
  when: i915_hw_check.rc == 0
  tags: [packages, i915-sriov]

- name: Fail on kernel/headers version mismatch
  ansible.builtin.fail:
    msg: >-
      Kernel (linux) and linux-headers versions do not match.
      DKMS cannot build modules with mismatched headers.
      Reboot into the installed kernel or install matching headers
      with: pacman -Syu linux linux-headers
  when:
    - i915_hw_check.rc == 0
    - kernel_headers_match.rc | default(0) != 0
  tags: [packages, i915-sriov]

- name: Build DKMS module for current kernel
  become: true
  ansible.builtin.command:
    cmd: dkms autoinstall i915-sriov-dkms
  when: i915_hw_check.rc == 0
  changed_when: false
  check_mode: false
  notify: Regenerate initramfs
  tags: [packages, i915-sriov]

- name: Verify DKMS module installed for current kernel
  ansible.builtin.shell: |
    set -o pipefail
    dkms status 2>/dev/null | grep -q 'i915-sriov-dkms.*: installed'
  register: dkms_verify
  changed_when: false
  failed_when: false
  when: i915_hw_check.rc == 0
  tags: [packages, i915-sriov]

- name: Fail if DKMS module not installed
  ansible.builtin.fail:
    msg: >-
      i915-sriov-dkms DKMS module is not installed for the current kernel.
      Check 'dkms status' and kernel headers ('linux-headers').
  when:
    - i915_hw_check.rc == 0
    - dkms_verify.rc != 0
  tags: [packages, i915-sriov]

- name: Force initramfs rebuild now to verify
  ansible.builtin.meta: flush_handlers
  when: i915_hw_check.rc == 0
  tags: [packages, i915-sriov]

- name: Find initramfs image
  ansible.builtin.shell: |
    set -o pipefail
    ls /boot/initramfs-linux*.img 2>/dev/null | head -1
  register: initramfs_path
  changed_when: false
  when: i915_hw_check.rc == 0
  tags: [packages, i915-sriov]

- name: Verify patched i915 module in initramfs
  ansible.builtin.command:
    cmd: "lsinitcpio {{ initramfs_path.stdout }}"
  register: initramfs_content
  changed_when: false
  when:
    - i915_hw_check.rc == 0
    - initramfs_path.stdout | length > 0
  tags: [packages, i915-sriov]

- name: Assert DKMS i915 module is in initramfs
  ansible.builtin.assert:
    that: "'updates/dkms/i915.ko' in initramfs_content.stdout"
    fail_msg: >-
      Patched i915 module not found in initramfs. DKMS may have failed to build.
      Check 'dkms status' and 'journalctl -u dkms'.
  when:
    - i915_hw_check.rc == 0
    - initramfs_path.stdout | length > 0
  tags: [packages, i915-sriov]

- name: Install VAAPI and OpenCL packages
  when: i915_hw_check.rc == 0
  community.general.pacman:
    name:
      - intel-media-driver
      - libva-utils
      - intel-compute-runtime
      - clinfo
    state: present
  tags: [packages, i915-sriov]

- name: Detect bootloader type (systemd-boot)
  ansible.builtin.stat:
    path: /boot/loader/entries
  register: systemd_boot_dir
  when: i915_hw_check.rc == 0

- name: Detect bootloader type (GRUB)
  ansible.builtin.stat:
    path: /etc/default/grub
  register: grub_config
  when:
    - i915_hw_check.rc == 0
    - not systemd_boot_dir.stat.exists

- name: Fail if no supported bootloader found
  ansible.builtin.fail:
    msg: >-
      No supported bootloader detected. Please manually add kernel parameters
      'i915.enable_guc=3 module_blacklist=xe' to your bootloader configuration.
  when:
    - i915_hw_check.rc == 0
    - not systemd_boot_dir.stat.exists
    - not grub_config.stat.exists

- name: Configure kernel parameters for systemd-boot
  when:
    - i915_hw_check.rc == 0
    - systemd_boot_dir.stat.exists
  block:
    - name: Find systemd-boot entry files
      ansible.builtin.find:
        paths: /boot/loader/entries
        patterns: "*.conf"
      register: sd_boot_entries

    - name: Append kernel parameters to systemd-boot entries
      ansible.builtin.lineinfile:
        path: "{{ item.path }}"
        regexp: '^options(?!.*i915\.enable_guc=3)(\s+.*)$'
        backrefs: true
        line: 'options\1 i915.enable_guc=3 module_blacklist=xe'
      loop: "{{ sd_boot_entries.files }}"
      loop_control:
        label: "{{ item.path }}"
      notify: Regenerate initramfs

- name: Configure kernel parameters for GRUB
  when:
    - i915_hw_check.rc == 0
    - not systemd_boot_dir.stat.exists
    - grub_config.stat.exists
  block:
    - name: Append kernel parameters to GRUB config
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: "^(?!.*i915\\\\.enable_guc=3)GRUB_CMDLINE_LINUX_DEFAULT='([^']*)'"
        line: "GRUB_CMDLINE_LINUX_DEFAULT='\\1 i915.enable_guc=3 module_blacklist=xe'"
        backrefs: true
      notify: Regenerate initramfs

    - name: Regenerate GRUB config
      ansible.builtin.command:
        cmd: "grub-mkconfig -o /boot/grub/grub.cfg"
      changed_when: false
