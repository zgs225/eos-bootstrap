---
- name: Install official packages
  ansible.builtin.include_tasks: pacman.yml
  tags: [packages, pacman]

- name: Configure audio
  ansible.builtin.include_tasks: audio.yml
  tags: [packages, audio]

- name: Install Thunar file manager and extensions
  ansible.builtin.include_tasks: thunar.yml
  tags: [packages, thunar]

- name: Install AUR packages
  ansible.builtin.include_tasks: aur.yml
  tags: [packages, aur]

- name: Detect VM environment
  ansible.builtin.include_tasks: vm_detect.yml
  tags: [packages, vm]

- name: Conditionally install bluetooth
  ansible.builtin.include_tasks: bluetooth.yml
  tags: [packages, bluetooth]

- name: Configure VM guest packages and services
  ansible.builtin.include_tasks: vm_services.yml
  tags: [packages, vm]

- name: Conditionally install i915-sriov driver
  ansible.builtin.include_tasks: i915-sriov.yml
  tags: [packages, i915-sriov]

- name: Conditionally install Sunshine for remote desktop
  ansible.builtin.include_tasks: sunshine.yml
  tags: [packages, sunshine]

- name: Configure xrdp when xrdp_enabled is true
  ansible.builtin.include_tasks: xrdp.yml
  when: xrdp_enabled | default(false) | bool
  tags: [packages, xrdp]
